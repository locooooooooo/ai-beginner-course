[deep_note]
plain = """工作流不是让 AI 回答一次，而是把一个任务拆成可重复的步骤：输入是什么、谁处理、调用什么工具、输出什么、怎么检查、失败怎么办。能重复跑、能复盘，才叫工作流。"""
checks = [
  """我能否画出完整步骤？""",
