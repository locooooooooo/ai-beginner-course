[[deep_note.teacher_script]]
title = """把提示词还原成工作单"""
body = """不要把提示词讲成神秘咒语。让学生想象自己把任务交给一个实习生，必须说清角色、材料、要求、格式和验收点。"""

[[deep_note.teacher_script]]
title = """强调输出格式"""
body = """新手常常只要求“写好一点”，但没有格式。结果看着不错却难复制、难检查、难放进表格。固定格式是提示词最实用的部分。"""

[[deep_note.teacher_script]]
title = """用示例降低歧义"""
body = """如果你想要某种标题风格，就给 1 到 2 个示例。示例不是为了让 AI 抄，而是让模型把你的风格要求映射到更明确的输出模式。"""

[deep_note.walkthrough]
scene = """写一篇新品介绍提示词"""
steps = [
  """设定角色：你是一名电商商品文案编辑。""",
  """说明任务：为新品保温杯写 500 字介绍。""",
  """给上下文：列出材质、容量、人群、卖点。""",
  """定格式：标题、卖点列表、正文、注意事项。""",
]

