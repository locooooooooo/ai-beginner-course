[[deep_note.teacher_script]]
title = """先展示差问题为什么差"""
body = """以“帮我写个文案”为例。它没有产品、渠道、受众、风格、字数、禁忌和验收标准，模型只能基于缺失信息补全，所以结果大概率空泛。"""

[[deep_note.teacher_script]]
title = """再套四件套"""
body = """目标说明要交付什么，上下文提供背景材料，约束说明边界和风格，验收标准说明什么叫可用。四件套是新手最先要形成的肌肉记忆。"""

[[deep_note.teacher_script]]
