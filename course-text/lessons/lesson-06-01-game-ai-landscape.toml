[[deep_note.teacher_script]]
title = """先拆游戏生产链路"""
body = """不要先问 AI 能不能做游戏。先把游戏拆成玩法设计、引擎实现、美术资产、UI、关卡、测试和发布。不同环节能交给 AI 的程度完全不同。"""

[[deep_note.teacher_script]]
title = """再讲行业变化"""
body = """生成式 AI 已经进入游戏团队的实际工作，但争议也集中在裁员压力、版权、风格同质化和质量控制。课程要教的是安全落地，不是制造工具幻觉。"""

[[deep_note.teacher_script]]
title = """最后建立验收意识"""
body = """游戏最终靠体验说话。一个 AI 输出要进入项目，至少要能被运行、试玩、截图、审查来源或写入复盘。没有证据的内容只能算草稿。"""

