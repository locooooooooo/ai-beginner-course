title = """先建立验证不是不信任"""
body = """验证不是否定 AI，而是把 AI 放进正常工作流程。人写的内容也要审核，AI 生成的内容更需要明确检查点。"""

[[deep_note.teacher_script]]
title = """拆成四层检查"""
body = """事实层查来源，逻辑层查前后是否矛盾，数据层查数字和单位，格式层查能不能直接交付。四层分开，新手才知道具体怎么查。"""

[[deep_note.teacher_script]]
title = """把验证沉淀成清单"""
body = """每次临时凭感觉检查很不稳定。让学生为自己的场景写验证清单，比如商品文案检查规格、价格、禁用词和承诺边界。"""

