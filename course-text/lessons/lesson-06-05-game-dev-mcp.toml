[[deep_note.teacher_script]]
title = """先把 MCP 讲成连接层"""
body = """不要把 MCP 讲成神秘模型。它解决的是 AI 怎么安全地访问外部工具、数据和动作。游戏项目工具很多，所以 MCP 特别有用。"""

[[deep_note.teacher_script]]
title = """再分三类游戏场景"""
body = """Figma MCP 适合设计到 UI 实现，Unity MCP 或 UEMCP 适合引擎和编辑器自动化，文件系统和脚本 MCP 适合资源整理、日志和检查。"""

[[deep_note.teacher_script]]
title = """顺手把智能体职责讲清"""
body = """这节课不要只讲 MCP 工具，还要顺手讲清不同智能体的职责。Codex 更适合工程交付；OpenClaw 更像常驻个人助理；Hermes Agent 更强调长期记忆、自改进和持续跟进。"""

[[deep_note.teacher_script]]
title = """最后强调权限"""
body = """MCP 越强，越要小心。读取设计稿和列文件风险较低，批量改场景、删除资源、提交发布必须有人确认和可回滚。"""

