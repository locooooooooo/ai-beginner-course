[[deep_note.teacher_script]]
title = """先把 AI 从产品层里解耦出来"""
body = """新手最容易把 AI 等同于 ChatGPT、DeepSeek 或某个 App。讲课时先问学生：如果明天这个 App 换名字了，AI 还在不在？答案是还在，因为 AI 是能力和方法，不是入口名称。"""

[[deep_note.teacher_script]]
title = """再用任务判断 AI 类型"""
body = """让学生把一个任务写出来，比如整理会议纪要、推荐商品、识别发票。再判断它属于生成、推荐、识别还是预测。这个动作能把抽象概念落到真实工作里。"""

[[deep_note.teacher_script]]
title = """最后建立三层视角"""
body = """任务是你要完成的事，模型是背后的能力引擎，产品是你操作的入口。学 AI 的顺序应该从任务开始，而不是从产品排行榜开始。"""

[deep_note.walkthrough]
scene = """用 AI 写商品介绍"""
