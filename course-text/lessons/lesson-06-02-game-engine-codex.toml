title = """先把引擎任务文件化"""
body = """引擎里很多动作发生在编辑器和资源里。给 Codex 任务时，要把场景名、脚本路径、资源目录、输入方式和目标行为写出来。"""

[[deep_note.teacher_script]]
title = """一轮只做一个可玩变化"""
body = """移动、拾取、UI、门、敌人，每轮只做一个主要变化。这样失败时能定位，成功时能继续叠加。"""

[[deep_note.teacher_script]]
title = """验收必须打开引擎"""
body = """代码保存不等于原型可玩。至少要写出启动步骤、试玩步骤、预期反馈和问题记录。能截图或录屏更好。"""

